<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尊孔独中董事会认人小游戏 - 25题挑战版</title>
    <style>
        :root {
            --primary-color: #800000; /* 尊孔校色调 - 枣红/深红 */
            --accent-color: #f1c40f;
            --bg-color: #f8f9fa;
        }
        box-sizing: border-box;
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }
        h1 { color: var(--primary-color); margin-bottom: 5px; font-size: 1.6em; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 0.85em; }
        
        .score-board {
            display: flex;
            justify-content: space-between;
            background: #fff9e6;
            padding: 10px 15px;
            border-radius: 50px;
            margin-bottom: 20px;
            font-weight: bold;
            border: 1px solid #ffeeba;
            font-size: 0.9em;
        }

        .target-card {
            background: linear-gradient(135deg, #800000 0%, #a52a2a 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(128, 0, 0, 0.2);
        }
        .target-card p { margin: 5px 0; font-size: 1em; }
        .target-card .highlight {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: underline;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .option-box {
            position: relative;
            cursor: pointer;
            border-radius: 10px;
            overflow: hidden;
            border: 4px solid #eee;
            transition: all 0.3s ease;
            aspect-ratio: 1/1; /* 1:1 比例 */
            width: 100%;
            height: auto;
        }
        .option-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .option-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 确保不拉伸 */
        }
        .option-box.correct { border-color: #28a745; }
        .option-box.wrong { border-color: #dc3545; opacity: 0.7; }

        #message {
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: bold;
            min-height: 1.5em;
        }
        .btn {
            margin-top: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1.05em;
            cursor: pointer;
            display: none;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover { opacity: 0.9; }

        /* 结算界面遮罩层 - 手机端完美适配版 */
        #result-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .result-content { 
            max-width: 90%; 
            width: 400px;
            text-align: center; 
        }
        #result-emoji { font-size: 5em; margin-bottom: 0; }
        .result-content h2 { font-size: 2.2em; color: var(--accent-color); margin: 10px 0; }
        .result-score { 
            font-size: 3.5em; 
            font-weight: bold; 
            margin: 10px 0; 
            color: #fff;
            white-space: nowrap; /* 强制在一行显示 */
        }
        .result-score small { font-size: 0.4em; color: #aaa; }
        .result-text { font-size: 1.1em; line-height: 1.6; margin: 20px 0 30px; color: #ddd; padding: 0 10px; }
        .restart-btn {
            background: var(--accent-color);
            color: #800000;
            padding: 14px 35px;
            font-weight: bold;
            font-size: 1.1em;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            width: 80%;
            max-width: 250px;
            box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 认人挑战赛</h1>
    <div class="subtitle">尊孔独立中学 2024-2026年度董事会 (25题版)</div>

    <div class="score-board">
        <span>进度: <span id="round-num">1</span> / 25</span>
        <span>得分: <span id="score-num">0</span></span>
    </div>

    <div class="target-card">
        <p>请找出这位董事：</p>
        <p>姓名：<span id="t-name" class="highlight"></span></p>
        <p>职位：<span id="t-pos"></span></p>
        <p>代表：<span id="t-group"></span></p>
    </div>

    <div class="image-grid" id="grid"></div>

    <div id="message"></div>
    <button class="btn" id="next-btn" onclick="initRound()">下一题 ➡️</button>
</div>

<div id="result-overlay">
    <div class="result-content">
        <div id="result-emoji">🏆</div>
        <h2 id="result-title">挑战结束！</h2>
        <div class="result-score"><span id="final-score">0</span><small> / 100</small></div>
        <p id="result-text" class="result-text"></p>
        <button class="restart-btn" onclick="location.reload()">再战一场 🔄</button>
    </div>
</div>

<script>
    const rawData = [
        { n: "沈德和", p: "董事长", g: "个人董事" },
        { n: "侯渊富", p: "署理董事长", g: "个人董事" },
        { n: "叶顺志", p: "副董事长", g: "个人董事" },
        { n: "拿督王发", p: "副董事长", g: "个人董事" },
        { n: "黄荣庆", p: "副董事长", g: "个人董事" },
        { n: "拿督杨括添", p: "副董事长", g: "个人董事" },
        { n: "詹美云", p: "副董事长", g: "雪隆尊孔学校校友会" },
        { n: "拿督罗文森", p: "副董事长", g: "尊孔独中家教协会" },
        { n: "叶少华", p: "总务", g: "个人董事" },
        { n: "陈长洲", p: "副总务", g: "个人董事" },
        { n: "蓝裕和", p: "副总务", g: "个人董事" },
        { n: "陈正锦", p: "财政", g: "个人董事" },
        { n: "龚铭恩", p: "副财政", g: "个人董事" },
        { n: "黄金水", p: "联络主任", g: "个人董事" },
        { n: "李庆进", p: "副联络主任", g: "个人董事" },
        { n: "陈加仁", p: "常务董事", g: "个人董事" },
        { n: "林美莲", p: "常务董事", g: "个人董事" },
        { n: "邓宏智", p: "董事", g: "雪隆广西会馆" },
        { n: "吴利传", p: "董事", g: "雪隆茶阳（大埔）回春馆" },
        { n: "杨碧玉", p: "董事", g: "雪隆潮州会馆" },
        { n: "黄成就", p: "董事", g: "旧吧生路快乐花园关帝威灵庙" },
        { n: "余文水", p: "董事", g: "吉隆坡卫理公会福建堂" },
        { n: "李侑铭", p: "董事", g: "雪隆福州会馆" },
        { n: "林勇忠", p: "董事", g: "雪隆广东会馆" },
        { n: "锺鉴辉", p: "董事", g: "雪隆嘉应会馆" },
        { n: "拿督王明威律师", p: "董事", g: "雪隆精武体育会" },
        { n: "黄兴隆", p: "董事", g: "吉隆坡暨雪兰莪河婆同乡会" },
        { n: "陈开府", p: "董事", g: "雪隆海南会馆" },
        { n: "郭炜勇", p: "董事", g: "雪隆茶阳（大埔）会馆" },
        { n: "盛盟强", p: "董事", g: "雪隆尊孔学校校友会" },
        { n: "郑天辉", p: "董事", g: "东美布庄有限公司" },
        { n: "李英维", p: "董事", g: "雪兰莪暨联邦直辖区中山同乡会" },
        { n: "叶志行", p: "董事", g: "雪隆叶氏宗祠" },
        { n: "黄公龙", p: "董事", g: "瑞泰企业有限公司" },
        { n: "傅丽玲", p: "董事", g: "尊孔独中家教协会" },
        { n: "梁永杰", p: "董事", g: "个人董事" },
        { n: "吴宪民", p: "董事", g: "个人董事" },
        { n: "林国元", p: "董事", g: "个人董事" },
        { n: "王水良", p: "常务董事", g: "个人董事" },        
        { n: "张志明", p: "董事", g: "个人董事" },
        { n: "吕锦威", p: "董事", g: "个人董事" },
        { n: "李胜国", p: "董事", g: "个人董事" },
        { n: "邱建成", p: "董事", g: "个人董事" },
        { n: "徐盛清", p: "董事", g: "个人董事" },
        { n: "莫泽林", p: "董事", g: "个人董事" },
        { n: "林尊文", p: "董事", g: "个人董事" },
        { n: "魏国明", p: "董事", g: "个人董事" },
        { n: "廖应良", p: "董事", g: "个人董事" }
    ];

    let score = 0;
    let round = 0;
    const maxRounds = 25; 
    let currentTarget = null;
    let isAnswered = false;

    function initRound() {
        if (round >= maxRounds) {
            showResults();
            return;
        }
        
        isAnswered = false;
        round++;
        document.getElementById('round-num').innerText = round;
        document.getElementById('message').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        
        if(round === maxRounds) {
            document.getElementById('next-btn').innerText = "查看结算成绩 🏆";
        }

        const shuffled = [...rawData].sort(() => 0.5 - Math.random());
        const options = shuffled.slice(0, 4);
        currentTarget = options[Math.floor(Math.random() * 4)];

        document.getElementById('t-name').innerText = currentTarget.n;
        document.getElementById('t-pos').innerText = currentTarget.p;
        document.getElementById('t-group').innerText = currentTarget.g;

        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        options.forEach(item => {
            const box = document.createElement('div');
            box.className = 'option-box';
            const img = document.createElement('img');
            img.src = `images/${item.n}.jpg`;
            img.onerror = () => { img.src = `https://via.placeholder.com/250x300?text=${item.n}`; };
            
            box.appendChild(img);
            box.onclick = () => checkAnswer(item, box);
            grid.appendChild(box);
        });
    }

    function checkAnswer(selected, element) {
        if (isAnswered) return;
        isAnswered = true;

        const msg = document.getElementById('message');
        const boxes = document.querySelectorAll('.option-box');

        if (selected.n === currentTarget.n) {
            element.classList.add('correct');
            msg.innerText = "✅ 答对了！太棒了！";
            msg.style.color = "#28a745";
            score += 4; // 答对一题得 4 分
            document.getElementById('score-num').innerText = score;
        } else {
            element.classList.add('wrong');
            msg.innerText = `❌ 认错了，这位是${selected.n}`;
            msg.style.color = "#dc3545";
            
            boxes.forEach((b) => {
                if (b.querySelector('img').src.includes(encodeURIComponent(currentTarget.n))) {
                    b.classList.add('correct');
                }
            });
        }
        document.getElementById('next-btn').style.display = "inline-block";
    }

    function showResults() {
        const overlay = document.getElementById('result-overlay');
        const finalScore = document.getElementById('final-score');
        const title = document.getElementById('result-title');
        const text = document.getElementById('result-text');
        const emoji = document.getElementById('result-emoji');
        
        // 分数本身就是百分制，直接作为 percent 判断
        finalScore.innerText = score;
        overlay.style.display = "flex";

        if (score === 100) {
            emoji.innerText = "👑";
            title.innerText = "尊孔百晓生！";
            text.innerText = "太震撼了！您对董事会成员了如指掌，学校的每一份子都应该向您致敬。您就是尊孔最强大脑！";
        } else if (score >= 70) {
            emoji.innerText = "🌟";
            title.innerText = "中流砥柱！";
            text.innerText = "表现非常出色！您一定经常关注校务，董事们看到您如此熟悉他们，一定会感到非常欣慰！";
        } else if (score >= 50) {
            emoji.innerText = "📚";
            title.innerText = "再接再厉！";
            text.innerText = "表现不错，看来您已经认识了一半以上的董事。多参加活动，很快就能满分了！";
        } else {
            emoji.innerText = "😅";
            title.innerText = "认错人了？";
            text.innerText = "哎呀，看来您和董事们还有点“最熟悉的陌生人”。没关系，快去官网补补课，下次一定行！";
        }
    }

    window.onload = initRound;
</script>

</body>
</html>
